[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests

# ── Python path ────────────────────────────────────────────────────────────────
# Adds BOTH the project root and src/ to sys.path before collecting tests.
#
# Why two paths are needed:
#   .     (project root) → resolves "from src.rules.x import ..."
#                          resolves "from src.water_tank import ..."
#                          resolves "from src.validation_engine import ..."
#
#   src   (src/ directory) → resolves bare "from rules.base_rule import ..."
#                             inside src/rules/__init__.py
#
# Previously this worked because "pip install -e ." was run — the editable
# install puts src/ on sys.path automatically at Python startup.
# This explicit setting makes pytest self-contained without needing -e install.
pythonpath = . src

# ── Async tests ─────────────────────────────────────────────────────────────────
# asyncio_mode requires pytest-asyncio >= 0.21.
# If you see "Unknown config option: asyncio_mode", run:
#   pip install pytest-asyncio --upgrade
asyncio_mode = auto
